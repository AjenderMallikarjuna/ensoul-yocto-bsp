header:
  version: 14

machine: qemuarm64
distro: poky
target:
  - anime-ai-image

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-anime-ai:
    path: .
    layers:
      meta-anime-ai:

local_conf_header:
  anime-ai-base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks ssh-server-openssh"

  anime-ai-systemd: |
    DISTRO_FEATURES:append = " systemd usrmerge wifi bluetooth alsa"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    VIRTUAL-RUNTIME_initscripts = ""
    DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

  anime-ai-audio: |
    # QEMU Intel HDA audio emulation.
    # QB_AUDIO_DRV controls the host-side backend:
    #   "pa"   — PulseAudio (works on WSL2 with WSLg, native Linux)
    #   "alsa" — ALSA directly on the host
    #   "wav"  — write audio to /tmp/ensoul-qemu.wav (no host audio needed)
    QB_AUDIO_DRV = "pa"
    QB_AUDIO_OPT = "-device intel-hda -device hda-duplex,audiodev=snd0 -audiodev pa,id=snd0"
    MACHINE_FEATURES:append = " alsa"

  anime-ai-dev: |
    INHERIT += "rm_work"
    BB_NUMBER_THREADS = "4"
    PARALLEL_MAKE = "-j4"
    PARALLEL_MAKE:pn-libmpc-native = "-j1"
