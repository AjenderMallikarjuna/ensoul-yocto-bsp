# ALSA core
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_PCM=y
CONFIG_SND_TIMER=y
CONFIG_SND_COMPRESS_OFFLOAD=y
CONFIG_SND_PCM_OSS=y
CONFIG_SND_SEQUENCER=y

# Intel HDA — used by QEMU's intel-hda device emulation
CONFIG_SND_HDA_CORE=y
CONFIG_SND_HDA=y
CONFIG_SND_HDA_INTEL=y
CONFIG_SND_HDA_CODEC_GENERIC=y
CONFIG_SND_HDA_CODEC_HDMI=y
CONFIG_SND_HDA_GENERIC=y

# Virtio sound — for future real-hardware virtio audio path
CONFIG_SND_VIRTIO=y

# USB audio — for USB mic/speaker accessories
CONFIG_SND_USB_AUDIO=y

# ALSA dummy device — useful for headless CI tests
CONFIG_SND_DUMMY=y
